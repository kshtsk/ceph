tasks:
- cephadm.shell:
    host.a:
      - |
        set -e
        set -x
        ceph orch ps
        ceph orch device ls
        DEVPATH=$(ceph orch device ls --format=json | jq -r '.[] | .devices[] | select(.lvs[].osd_id == "1") | .path')
        DEVHOST=$(ceph orch device ls --format=json | jq -r '.[] | .addr as $host | .devices[] | select(.lvs[].osd_id == "1") | $host')
        echo "host $DEVHOST, dev $DEVPATH"
        ceph orch osd rm 1
        while ceph orch osd rm status | grep ^1 ; do sleep 5 ; done
        ceph orch device zap $DEVHOST $DEVPATH --force
        ceph orch daemon add osd $DEVHOST:$DEVPATH
        while ! ceph osd dump | grep osd.1 | grep up ; do sleep 5 ; done
